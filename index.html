<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime SQL Academy</title>
  <link rel="icon" href="./assets/favicon.svg">
  <link rel="stylesheet" href="./css/styles.css">
  <!--
    sql.js is a CLASSIC (UMD) script: it exposes a global `initSqlJs`.
    An ES-module `import` of it resolves to `undefined` in the browser, so it
    MUST be a classic <script> and MUST load BEFORE the module that reads the
    global. Do not add type="module" here.

    CodeMirror is NOT loaded here — js/editor.js imports the committed, vendored
    bundle ./vendor/codemirror.bundle.js (no node_modules, no CDN).
  -->
  <script src="./vendor/sql-wasm.js"></script>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Anime SQL Academy</h1>
      <p class="tagline">Learn SQL &mdash; with a heavy dose of JOINs &mdash; on an anime database.</p>
    </div>
    <nav class="topnav">
      <a id="nav-lessons" href="#/" class="nav-link active">Lessons</a>
      <a id="nav-explore" href="#/explore" class="nav-link">Explore</a>
    </nav>
  </header>

  <div id="status" class="status">Loading SQL engine&hellip;</div>

  <main class="workbench">
    <aside id="schema-panel" class="panel schema-panel" aria-label="Database schema"></aside>

    <section class="workspace">
      <!-- Lesson map / home (default route) -->
      <div id="view-map" class="view"></div>

      <!-- Lesson runner -->
      <div id="view-lesson" class="view hidden"></div>

      <!-- Explore (free-form sandbox) -->
      <div id="view-explore" class="view hidden">
        <div class="editor-wrap">
          <div id="editor" class="editor" aria-label="SQL editor"></div>
        </div>
        <div class="toolbar">
          <button id="run-btn" type="button" class="btn btn-primary">Run &#9654;</button>
          <button id="reset-btn" type="button" class="btn">Reset database</button>
          <label class="persist">
            <input id="persist-toggle" type="checkbox">
            Persist my changes
          </label>
          <span class="hint">Ctrl/Cmd+Enter to run</span>
        </div>
        <div id="result" class="result"></div>
      </div>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
